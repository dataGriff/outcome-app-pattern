dataContractSpecification: 1.2.0
id: urn:outcome-app-pattern:data-product:daily-colour-aggregate
info:
  title: Daily Colour Aggregate (curated data product)
  version: 1.0.0
  description: >
    Daily counts of generated colours, produced by the summariser from the raw
    colour_generated stream. Curated data product: typed, columnar Parquet.
  owner: Data Team
  contact:
    name: Data Team
    email: data@example.com

servers:
  aggregate:
    type: s3
    location: s3://mybucket/daily_colour_aggregate/*.parquet
    endpointUrl: http://seaweedfs:8333
    format: parquet

models:
  daily_colour_aggregate:
    description: Count of generated colours per colour per day.
    type: table
    fields:
      date:
        type: string
        description: The day of the aggregation (YYYY-MM-DD).
      colour:
        type: string
        description: The colour being aggregated.
        enum: [red, amber, green]
      count:
        type: integer
        description: The number of events for the colour on the day.

servicelevels:
  frequency:
    description: Recomputed on a regular cadence from the raw stream.
    type: batch
    cron: "0 * * * *"
