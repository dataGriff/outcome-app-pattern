services:

  contract-test:
    image: python:3.12-slim
    container_name: contract-test
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - behaviour-service
      - event-hub
    command: >
      sh -c "pip install -r requirements.txt && pip install pyyaml jsonschema nats-py requests && python3 domain/api/tests/integration/test_event_contract.py"
  
  behaviour-service:
    build:
      context: ./domain/api
    container_name: behaviour-service
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
    - NATS_URL=nats://event-hub:4222

  event-hub:
    image: nats:2.10-alpine
    container_name: event-hub
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    command: ["-js"]
  
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    ports:
      - "8333:8333"   # S3 API
      - "8888:8888"   # filer UI
      - "9333:9333"   # master UI
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    volumes:
      - seaweed_data:/data
      - ./platform/storage/s3.json:/etc/seaweedfs/s3.json:ro
    restart: unless-stopped

  seaweedfs-init:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-init
    depends_on:
      - seaweedfs
    entrypoint: >
      /bin/sh -c '
        sleep 8;
        echo "s3.bucket.create -name mybucket" | weed shell -master=seaweedfs:9333;
      '
    restart: "no"

  bento-streaming:
    image: ghcr.io/warpstreamlabs/bento:latest
    container_name: bento-streaming
    depends_on:
      - event-hub
      - seaweedfs
    volumes:
      - ./platform/streaming/bento/streaming.yaml:/bento.yaml:ro
    command: ["-c", "/bento.yaml"]
    ports:
      - "4195:4195"
    restart: unless-stopped

  visualisation:
    build:
      context: ./platform/analytics/visualisation
    container_name: visualisation
    depends_on:
      - seaweedfs
    environment:
      AWS_ACCESS_KEY_ID: demokey
      AWS_SECRET_ACCESS_KEY: demosecret
      AWS_REGION: us-east-1
      S3_ENDPOINT: http://seaweedfs:8333
      BUCKET: mybucket
    ports:
      - "8501:8501"
    restart: unless-stopped

  web-frontend:
    build:
      context: ./experiences/web
    container_name: web-frontend
    depends_on:
      - behaviour-service
    ports:
      - "5001:5000"   # host 5000 is often taken by macOS AirPlay Receiver
    restart: unless-stopped

volumes:
  seaweed_data:
